<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn 8/3</title>
    <style>
        :root { --primary: #1a49ba; --orange: #ff6f00; }
        body { font-family: sans-serif; background: var(--primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #333; }
        
        .container { background: #f4f7fe; padding: 20px; border-radius: 30px; width: 95%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* Vòng quay */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; z-index: 10; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }

        /* Input phong cách Azota */
        .input-group { display: flex; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin: 15px 0; background: white; }
        .input-label { background: #eee; padding: 10px; font-size: 14px; min-width: 80px; border-right: 1px solid #ddd; }
        input { flex: 1; border: none; padding: 10px; outline: none; }
        
        .btn-spin { background: var(--orange); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-spin:disabled { background: #ccc; }

        /* Modal lời chúc */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; max-width: 350px; text-align: center; position: relative; }
        .close-btn { margin-top: 15px; padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h3>Vòng Quay Quà Tặng 8/3</h3>
    
    <div class="wheel-container">
        <img src="https://cdn-icons-png.flaticon.com/512/2553/2553232.png" class="pointer">
        <canvas id="wheel"></canvas>
    </div>

    <div class="input-group">
        <div class="input-label">Họ và tên</div>
        <input type="text" id="userName" placeholder="Nhập tên của bạn...">
    </div>

    <button class="btn-spin" onclick="spinWheel()">QUAY THƯỞNG</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h2 id="resultTitle" style="color: var(--orange);">Chúc mừng!</h2>
        <p id="resultMessage" style="line-height: 1.6; font-size: 15px;"></p>
        <button class="close-btn" onclick="closeModal()">Nhận quà</button>
    </div>
</div>

<script>
    // Dữ liệu 12 bạn nữ đã đảo ngược ngày sinh
    const data = [
        { name: "Đinh Diệp Ánh", dob: "20/04/2009", message: "Người con gái họ Đinh mang tên một loài cỏ lá xanh ngời ơi! Cậu biết không, cái tên của cậu luôn gợi nhắc về những tia sáng rạng rỡ nhất len lỏi qua tán lá. Chúc Diệp Ánh ngày 8/3 không chỉ xinh đẹp mà còn luôn giữ được sự ấm áp, tỏa sáng trong mọi hành trình cậu chọn. Mong thế giới này sẽ luôn dịu dàng với cô gái tháng Tư như cách cậu đối đãi với mọi người." },
        { name: "Thạch Bảo Châu", dob: "30/08/2009", message: "Chào đời vào một ngày cuối tháng Tám mùa thu dịu nhẹ, cậu chính là viên ngọc quý mà lớp mình thật may mắn khi có được. Bảo Châu à, người ta nói ngọc quý cần mài giũa, nhưng mình thấy cậu vốn đã tự thân lấp lánh bằng sự bản lĩnh và tự lập rồi. Chúc cậu một ngày 8/3 tràn đầy niềm vui, mong rằng tuổi mới sắp tới của cậu sẽ rực rỡ và quý giá y như cái tên của cậu vậy." },
        { name: "Nguyễn Ngọc Giang", dob: "06/09/2009", message: "Gửi tới người con gái họ Nguyễn mang tên dòng sông ngọc bích những lời chúc chân thành nhất! Ngọc Giang thân mến, cậu mang trong mình vẻ đẹp sâu lắng và êm đềm của tháng Chín mùa thu. Cầu mong cuộc sống của cậu sẽ luôn trôi chảy thuận lợi như dòng nước mát, lúc nào cũng đầy ắp tiếng cười và những điều ngọt ngào nhất sẽ luôn cập bến cuộc đời cậu." },
        { name: "Lê Thuý Hà", dob: "25/03/2009", message: "Sinh ra vào tháng Ba - tháng của phái đẹp và sự đâm chồi nảy lộc, Thuý Hà chính là hiện thân của sức sống mùa xuân tươi trẻ nhất. Có vẻ như sự tinh khôi của đất trời lúc sang xuân đã thấm đẫm vào tính cách của cậu vậy. Chúc cô gái họ Lê một ngày 8/3 thật hạnh phúc bên gia đình và bạn bè. Hãy cứ luôn yêu đời và giữ mãi nụ cười tỏa nắng ấy, vì đó là món quà tinh thần quý giá nhất của lớp mình." },
        { name: "Phạm Nguyễn Ngân Hà", dob: "08/12/2009", message: "Ngân Hà ơi, người con gái mang tên cả một dải tinh tú lung linh! Dù sinh ra vào tháng 12 mùa đông lạnh giá nhưng trái tim cậu lại cực kỳ ấm áp và bao dung. Chúc cậu ngày 8/3 thật rạng rỡ, mình mong rằng cậu sẽ luôn kiên định với những mục tiêu của mình, tỏa sáng theo cách riêng giữa bầu trời tri thức và mãi là người bạn đồng hành đáng tin cậy của chúng mình nhé." },
        { name: "Nguyễn Thu Hương", dob: "11/08/2009", message: "Tháng Tám mùa thu dường như đã ưu ái tặng cho lớp mình một đóa hoa mang tên Thu Hương đầy thanh khiết. Cái tên của cậu luôn gợi nhắc đến hương thơm nhẹ nhàng mà sâu đậm, khiến ai đi ngang cũng phải nhớ về. Chúc cậu 8/3 nhận được thật nhiều tình yêu thương, ngày càng xinh đẹp và gặt hái được những thành quả ngọt ngào trong hành trình học tập sắp tới." },
        { name: "Trần Trang Linh", dob: "16/10/2009", message: "Đến từ dòng họ Trần và sinh vào giữa tháng Mười mơ mộng, Trang Linh luôn sở hữu một sự điềm tĩnh và thông minh rất cuốn hút. Nhân ngày Quốc tế Phụ nữ, chúc cô gái cá tính của lớp mình một ngày thật ý nghĩa. Mong rằng mọi dự định cậu đang ấp ủ sẽ đều thành công rực rỡ, và mỗi ngày trôi qua đều là một trang nhật ký đầy ắp niềm vui và sự tự hào về bản thân." },
        { name: "Nguyễn Huyền Mai", dob: "19/06/2009", message: "Chào cô gái của nắng vàng tháng Sáu rực rỡ! Năng lượng và sự nhiệt huyết của mùa hè dường như luôn chảy trong huyết quản của Huyền Mai vậy. Chúc cậu ngày 8/3 luôn xinh đẹp như đóa hoa mai sớm mai, mãi giữ được sự trẻ trung và khao khát chinh phục những đỉnh cao mới. Cảm ơn cậu đã luôn mang lại không khí sôi nổi và nguồn năng lượng tích cực cho tập thể lớp mình." },
        { name: "Nguyễn Trà My", dob: "19/03/2009", message: "Trà My à, cậu sinh ra vào những ngày tháng Ba nồng nàn, thời điểm đẹp nhất của phái nữ chúng mình. Cậu luôn mang lại cảm giác thanh tao của trà và ngọt ngào của hoa, một sự kết hợp thật đặc biệt. Chúc cậu một ngày 8/3 thật hạnh phúc, mong cậu luôn bình yên, giữ được sự trong trẻo vốn có và chặng đường phía trước của cậu sẽ luôn trải đầy hoa hồng." },
        { name: "Nguyễn Khánh Phương", dob: "11/08/2009", message: "Gửi lời chúc 8/3 nồng nhiệt nhất tới cô gái tháng Tám mang tên Khánh Phương! Sự chân thành và năng lượng lạc quan của cậu luôn là điều khiến mọi người xung quanh cảm thấy ấm lòng. Chúc Phương một ngày lễ thật rạng rỡ, nhận được thật nhiều lời chúc ý nghĩa và luôn tự tin vững bước trên con đường mình đã chọn. Sự tử tế của cậu chắc chắn sẽ được đáp đền bằng những điều tốt đẹp." },
        { name: "Nguyễn Thị Hoài Phương", dob: "21/05/2009", message: "Sinh ra vào tháng Năm khi sắc phượng bắt đầu thắp lửa, Hoài Phương luôn mang lại cảm giác nồng hậu và đầy hy vọng. Chúc cậu ngày 8/3 thật vui vẻ bên những người thân yêu. Mong rằng tuổi thanh xuân của cậu sẽ là một hành trình rực rỡ như nắng hè, tràn ngập tiếng cười và những kỉ niệm đẹp đẽ không bao giờ phai dấu dưới mái trường này." },
        { name: "Trần Hà Thanh", dob: "10/05/2009", message: "Người con gái họ Trần mang tên dòng sông trong xanh ơi, cậu có biết vẻ bình yên của cậu rất đáng quý không? Sinh vào đầu tháng Mười dịu mát, Hà Thanh luôn mang lại cảm giác nhẹ nhàng cho người đối diện. Chúc cậu ngày 8/3 thật hạnh phúc. Mong tâm hồn cậu luôn xanh trong như mặt hồ thu, mọi việc hanh thông và cuộc đời sẽ luôn mỉm cười với một cô gái đáng mến như cậu." }
    ];

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const items = ["Quà 1", "Lời Chúc", "Quà 2", "Lời Chúc", "Quà 3", "Lời Chúc", "May Mắn", "Lời Chúc"];
    const colors = ["#ff9f43", "#ee5253", "#0abde3", "#10ac84", "#5f27cd", "#ff9ff3", "#54a0ff", "#2e86de"];
    
    let currentRotation = 0;
    canvas.width = 300; canvas.height = 300;

    function drawWheel() {
        const arc = (2 * Math.PI) / items.length;
        items.forEach((item, i) => {
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(150, 150);
            ctx.arc(150, 150, 145, i * arc, (i + 1) * arc);
            ctx.fill();
            ctx.save();
            ctx.translate(150, 150);
            ctx.rotate(i * arc + arc / 2);
            ctx.fillStyle = "white";
            ctx.font = "bold 14px sans-serif";
            ctx.fillText(item, 60, 5);
            ctx.restore();
        });
    }
    drawWheel();

    function spinWheel() {
        const nameInput = document.getElementById('userName').value.trim();
        const found = data.find(user => user.name.toLowerCase() === nameInput.toLowerCase());
        
        if (!nameInput) return alert("Vui lòng nhập họ và tên!");

        // --- PHẦN CƠ CẤU Ở ĐÂY ---
        // Nếu tên có trong danh sách, ta ép nó dừng ở ô số 1 (Lời Chúc)
        let stopAngle;
        if (found) {
            // Ép dừng ở góc thuộc ô "Lời Chúc" (ô số 1, index 1)
            stopAngle = 360 * 5 + (360 - (1 * 45 + 22)); 
        } else {
            // Nếu tên lạ, cho quay ngẫu nhiên
            stopAngle = 360 * 5 + Math.random() * 360;
        }

        currentRotation += stopAngle;
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        // Hiển thị kết quả sau khi quay xong (4s)
        setTimeout(() => {
            if (found) {
                document.getElementById('resultTitle').innerText = `Chúc mừng ${found.name}!`;
                document.getElementById('resultMessage').innerText = found.message;
            } else {
                document.getElementById('resultTitle').innerText = "Rất tiếc!";
                document.getElementById('resultMessage').innerText = "Tên bạn không có trong danh sách nhận thưởng hôm nay.";
            }
            document.getElementById('modal').style.display = 'flex';
        }, 4000);
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
