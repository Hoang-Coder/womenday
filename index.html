<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azota - Kiểm tra Toán học</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <header class="app-header">
        <i class="fa-solid fa-chevron-left"></i>
        <div class="header-title">
            <h1>Bắt đầu thi: KIỂM TRA MÔN TOÁN - GIỮA KỲ 2.docx</h1>
            <span><i class="fa-solid fa-lock" style="font-size: 10px;"></i> azota.vn</span>
        </div>
        <i class="fa-solid fa-ellipsis-vertical"></i>
    </header>

    <div class="main-container">
        
        <div class="top-tools">
            <button class="btn-ad-free">Bỏ quảng cáo</button>
            <i class="fa-regular fa-bell" style="font-size: 20px; color: #666;"></i>
            <div class="profile-badge">
                <i class="fa-regular fa-user"></i>
                <span class="count">1</span>
            </div>
        </div>

        <div class="exam-card">
            <span class="exam-filename">KIỂM TRA MÔN TOÁN - 11.docx</P></span>
            <span class="exam-code">Mã đề thi: a9voaw <i class="fa-solid fa-qrcode"></i></span>

            <div class="info-list">
                <div class="info-item">
                    <div class="info-label"><i class="fa-regular fa-clock"></i> Thời gian làm bài</div>
                    <div class="info-value">15 phút</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fa-regular fa-calendar"></i> Thời gian vào thi</div>
                    <div class="info-value">19/03/2025 08:00</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fa-regular fa-circle-question"></i> Số lượng câu hỏi</div>
                    <div class="info-value">40</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fa-solid fa-list-ul"></i> Loại đề</div>
                    <div class="info-value">Trắc nghiệm</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fa-regular fa-user"></i> Tổng lượt đã làm của đề</div>
                    <div class="info-value">37 lượt</div>
                </div>
                <div class="info-item" style="border-bottom: none;">
                    <div class="info-label"><i class="fa-regular fa-file-lines"></i> Số lượt làm đề còn lại</div>
                    <div class="info-value">0/1 lượt</div>
                </div>
            </div>

            <button class="btn-start">
                Bắt đầu thi <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
